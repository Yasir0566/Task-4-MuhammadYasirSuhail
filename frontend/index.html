<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Watchlist</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>My Movie Watchlist</h1>
    <p class="subtitle">This page talks to a separate backend server over the network.</p>

    <form id="movie-form">
      <input type="text" id="title-input" placeholder="Movie title" required />
      <input type="text" id="genre-input" placeholder="Genre (optional)" />
      <button type="submit">Add Movie</button>
    </form>

    <p id="status-message"></p>

    <ul id="movie-list"></ul>
  </main>

  <script src="script.js"></script>
</body>
</html>
